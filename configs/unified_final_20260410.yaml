output_root: outputs

datasets:
  - breast_cancer
  - adult_income
  - pima
  - heart
  - credit

methods:
  - gaussian_copula
  - tvae
  - ctgan
  - tabddpm_single
  - madifft

seeds: [0, 1, 2, 3, 4]

tstr:
  classifiers: [logistic_regression]

privacy:
  dcr_q: 0.01
  alpha_mixdist: 0.5

strong_audits:
  enable_domias: true
  enable_tapas: false

skip_strong_audits: false

method_params:
  tabddpm_single:
    params:
      device: cuda
      timesteps: 200
      schedule: cosine
      beta_scale: 0.9
      dropout: 0.1
      cont_scale: 1.0
      batch_size: 128
      epochs: 50
      include_label: false
  madifft:
    params:
      device: cuda
      timesteps: 200
      schedule: cosine
      beta_scale: 0.9
      dropout: 0.1
      cont_scale: 1.0
      batch_size: 128
      epochs: 50
      include_label: false
    evolution:
      population: 6
      generations: 3
      steps_per_gen: 5
      elite_k: 3
      mutation_rate: 0.4
      w_utility: 1.0
      w_privacy: 1.0
      w_fidelity: 1.0
      w_class_kl: 0.0

compute_fair:
  M: 6
  G: 3
  B: 5
